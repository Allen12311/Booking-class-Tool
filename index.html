<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程預約管理系統</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables ── */
:root {
  --ink: #1c1917; --paper: #fdfaf5; --cream: #f5f0e8; --gold: #b8894a;
  --gold-light: #d4aa6e; --gold-pale: #f0e4cc; --sage: #6b7c6e; --rust: #8b4a3c;
  --sky: #3d6b8c; --sky-light: #e8f0f5; --border: #e2d8c8; --text-sub: #7a6e62;
  --shadow: 0 2px 20px rgba(28,25,23,0.08); --shadow-lg: 0 8px 40px rgba(28,25,23,0.14);
  --danger: #c0392b; --danger-bg: #fdf0ee; --success: #2d7a4a; --success-bg: #e6f4ec;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Serif TC', 'PingFang TC', serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  background: var(--ink); color: var(--paper);
  padding: 0 36px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.logo-mark {
  width: 36px; height: 36px; border: 1.5px solid var(--gold); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold);
  flex-shrink: 0;
}
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: 2px; }
.header-actions { display: flex; gap: 10px; align-items: center; }
#userInfo { display: none; align-items: center; gap: 8px; color: #fff; font-size: 12px; }
#userAvatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }

/* ── BUTTONS ── */
.btn {
  font-family: 'Noto Serif TC', serif; font-size: 13px;
  padding: 8px 18px; border-radius: 4px; cursor: pointer;
  border: none; transition: all 0.18s; font-weight: 600;
}
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--paper); }
.btn-outline:hover { background: rgba(255,255,255,0.08); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* ── LAYOUT ── */
.app { display: flex; flex: 1; height: calc(100vh - 64px); }
.sidebar {
  width: 240px; background: var(--ink); color: var(--paper);
  overflow-y: auto; display: flex; flex-direction: column; flex-shrink: 0;
}
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.content { flex: 1; overflow-y: auto; padding: 28px; }

/* ── SIDEBAR ── */
.sidebar-inner { padding: 20px; flex: 1; }
.sidebar-label {
  font-size: 9px; letter-spacing: 2px; color: var(--gold-light);
  margin-bottom: 8px; margin-top: 4px; text-transform: uppercase;
}
.nav-item {
  padding: 9px 10px; cursor: pointer; border-radius: 6px;
  font-size: 13px; color: rgba(255,255,255,0.75);
  transition: background 0.15s, color 0.15s; display: flex; align-items: center; gap: 8px;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
.nav-item.active { background: rgba(184,137,74,0.25); color: var(--gold-light); }
.teacher-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; border-radius: 6px; font-size: 12px;
  color: rgba(255,255,255,0.65); transition: background 0.15s;
}
.teacher-item:hover { background: rgba(255,255,255,0.05); }
.teacher-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.teacher-del { opacity: 0; cursor: pointer; color: rgba(255,100,100,0.7); font-size: 14px; line-height: 1; border: none; background: none; padding: 0 2px; }
.teacher-item:hover .teacher-del { opacity: 1; }
.add-link {
  color: var(--gold); cursor: pointer; font-size: 12px;
  margin-top: 8px; padding: 4px 10px; display: inline-flex; align-items: center; gap: 4px;
}
.add-link:hover { color: var(--gold-light); }

/* ── TOOLBAR ── */
.toolbar {
  padding: 12px 28px; border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center; background: var(--paper); flex-shrink: 0;
}
.toolbar input, .toolbar select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 13px; background: #fff;
}
.toolbar input { flex: 1; min-width: 0; }
.toolbar select { max-width: 140px; }

/* ── TABLES ── */
.table-wrap { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; }
th { padding: 11px 16px; background: var(--cream); font-size: 11px; color: var(--text-sub); text-align: left; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fdf8f2; }
.td-actions { display: flex; gap: 6px; }
.no-data { text-align: center; padding: 48px; color: var(--text-sub); font-size: 14px; }

/* ── TAGS ── */
.tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.tag-confirmed { background: var(--success-bg); color: var(--success); }
.tag-pending { background: #fef3e2; color: #8b5e1a; }
.tag-cancelled { background: #f0f0f0; color: #888; text-decoration: line-through; }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: #fff; border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; box-shadow: var(--shadow);
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--ink); line-height: 1; }
.stat-label { font-size: 12px; color: var(--text-sub); margin-top: 6px; }

/* ── CALENDAR ── */
.cal-wrap { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
.cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.cal-nav { cursor: pointer; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 16px; cursor: pointer; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day-header { text-align: center; font-size: 11px; color: var(--text-sub); padding: 8px; background: var(--cream); font-weight: 600; }
.cal-cell {
  min-height: 80px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 6px; position: relative; vertical-align: top;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-date { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
.cal-date.today { background: var(--gold); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.cal-event {
  font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  background: var(--gold-pale); color: var(--ink);
}
.cal-cell.other-month .cal-date { opacity: 0.3; }

/* ── MODALS ── */
.overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--paper); padding: 28px; border-radius: 14px;
  width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal h3 { margin-bottom: 20px; font-size: 17px; }
.form-row { display: grid; gap: 14px; margin-bottom: 14px; }
.form-row.cols-2 { grid-template-columns: 1fr 1fr; }
.form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.field label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.3px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 13px; background: #fff; transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--gold);
}
.field input.error, .field select.error { border-color: var(--danger); }
.duration-hint { font-size: 12px; color: var(--text-sub); margin-bottom: 20px; min-height: 18px; }
.conflict-warn {
  background: #fdf0ee; border: 1px solid #f5c6c0; border-radius: 6px;
  padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 14px; display: none;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
.modal-actions .btn-cancel { background: #eee; color: #333; }

/* ── CONFIG MODAL ── */
.config-section { margin-bottom: 20px; }
.config-section h4 { font-size: 13px; margin-bottom: 10px; color: var(--text-sub); }
.config-field { margin-bottom: 10px; }
.config-field label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
.config-field input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; font-family: 'DM Mono', monospace; }

/* ── TOAST ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--ink); color: #fff; padding: 11px 16px; border-radius: 8px;
  font-size: 13px; border-left: 3px solid var(--gold);
  animation: slideIn 0.2s ease; max-width: 320px;
}
.toast.toast-error { border-left-color: var(--danger); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── LOADING ── */
.loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-sub); font-size: 14px; gap: 12px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SETUP SCREEN ── */
.setup-screen {
  display: none; position: fixed; inset: 0; background: var(--paper);
  z-index: 300; align-items: center; justify-content: center;
}
.setup-screen.open { display: flex; }
.setup-card {
  background: #fff; border: 1px solid var(--border); border-radius: 16px;
  padding: 40px; width: 480px; max-width: 95vw; box-shadow: var(--shadow-lg);
  text-align: center;
}
.setup-card .logo-mark { margin: 0 auto 20px; width: 52px; height: 52px; font-size: 24px; }
.setup-card h2 { font-size: 20px; margin-bottom: 8px; }
.setup-card p { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; }
.setup-fields { text-align: left; margin-bottom: 20px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .sidebar { width: 200px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
  .sidebar { display: none; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  header { padding: 0 16px; }
  .content { padding: 16px; }
}
</style>
</head>
<body>

<!-- ── SETUP SCREEN (Firebase Config) ── -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-card">
    <div class="logo-mark" style="border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:var(--gold);">秘</div>
    <h2>設定 Firebase 連線</h2>
    <p>請輸入您的 Firebase 專案設定，設定儲存於本機後即可開始使用。</p>
    <div class="setup-fields">
      <div class="config-field"><label>API Key *</label><input id="cfg_apiKey" placeholder="AIzaSy..."></div>
      <div class="config-field"><label>Auth Domain *</label><input id="cfg_authDomain" placeholder="your-project.firebaseapp.com"></div>
      <div class="config-field"><label>Project ID *</label><input id="cfg_projectId" placeholder="your-project-id"></div>
      <div class="config-field"><label>Storage Bucket</label><input id="cfg_storageBucket" placeholder="your-project.appspot.com"></div>
      <div class="config-field"><label>Messaging Sender ID</label><input id="cfg_messagingSenderId" placeholder="123456789"></div>
      <div class="config-field"><label>App ID</label><input id="cfg_appId" placeholder="1:123:web:abc..."></div>
    </div>
    <button class="btn btn-gold" style="width:100%" onclick="saveFirebaseConfig()">儲存並連線</button>
    <p style="margin-top:12px;font-size:11px;color:var(--text-sub);">設定儲存於瀏覽器 localStorage，不會傳送至任何第三方伺服器</p>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="logo" onclick="openSettings()">
    <div class="logo-mark" id="logoMark">秘</div>
    <div>
      <div class="logo-text" id="logoTitle">課程預約管理</div>
      <span id="logoSub" style="font-size:9px;color:var(--gold-light);display:block;">Schedule Manager</span>
    </div>
  </div>
  <div class="header-actions">
    <div id="userInfo">
      <img id="userAvatar" src="" alt="使用者頭像">
      <span id="userName"></span>
    </div>
    <button class="btn btn-outline" id="authBtn" onclick="handleAuth()">👤 登入</button>
    <button class="btn btn-gold" onclick="openNewBooking()">＋ 新增預約</button>
  </div>
</header>

<!-- ── APP LAYOUT ── -->
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-label">功能選單</div>
      <div class="nav-item active" id="nav-table" onclick="switchNav('table')">📋 預約清單</div>
      <div class="nav-item" id="nav-calendar" onclick="switchNav('calendar')">📅 月曆檢視</div>
      <div class="nav-item" id="nav-stats" onclick="switchNav('stats')">📊 統計總覽</div>
      <hr style="margin:16px 0;opacity:0.1;">
      <div class="sidebar-label">老師列表</div>
      <div id="teacherList"></div>
      <div class="add-link" onclick="openAddTeacher()">＋ 新增老師</div>
      <hr style="margin:16px 0;opacity:0.1;">
      <div class="sidebar-label">帳號群組</div>
      <div id="groupInfo" style="font-size:11px;color:rgba(255,255,255,0.45);padding:4px 10px;"></div>
      <div class="add-link" onclick="openJoinGroup()">＋ 加入／建立群組</div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="搜尋客戶、課程..." oninput="debouncedRender()">
      <select id="filterTeacher" onchange="renderAll()">
        <option value="">所有老師</option>
      </select>
      <select id="filterStatus" onchange="renderAll()">
        <option value="">所有狀態</option>
        <option value="confirmed">已確認</option>
        <option value="pending">待確認</option>
        <option value="cancelled">已取消</option>
      </select>
    </div>
    <div class="content" id="mainContent">
      <div class="loading-state"><div class="spinner"></div>載入中...</div>
    </div>
  </main>
</div>

<!-- ── BOOKING MODAL ── -->
<div class="overlay" id="bookingOverlay" onclick="overlayClick(event,'bookingOverlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">新增預約</h3>
    <input type="hidden" id="editId">

    <div class="form-row cols-2">
      <div class="field">
        <label>客戶姓名 *</label>
        <input id="fName" type="text" placeholder="王小明">
      </div>
      <div class="field">
        <label>老師 *</label>
        <select id="fTeacher"><option value="">選擇老師</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>課程名稱 *</label>
        <input id="fCourse" type="text" placeholder="例：鋼琴初級班">
      </div>
    </div>
    <div class="form-row cols-3">
      <div class="field">
        <label>日期 *</label>
        <input id="fDate" type="date">
      </div>
      <div class="field">
        <label>開始時間 *</label>
        <input id="fTime" type="time" oninput="autoCalcDuration()">
      </div>
      <div class="field">
        <label>結束時間 *</label>
        <input id="fEndTime" type="time" oninput="autoCalcDuration()">
      </div>
    </div>
    <div class="duration-hint" id="fDurationHint"></div>
    <div class="form-row">
      <div class="field">
        <label>狀態</label>
        <select id="fStatus">
          <option value="confirmed">已確認</option>
          <option value="pending">待確認</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>備註</label>
        <textarea id="fNote" rows="2" placeholder="選填..."></textarea>
      </div>
    </div>
    <div class="conflict-warn" id="conflictWarn"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('bookingOverlay')">取消</button>
      <button class="btn btn-gold" id="saveBtn" onclick="saveBooking()">儲存預約</button>
    </div>
  </div>
</div>

<!-- ── TEACHER MODAL ── -->
<div class="overlay" id="teacherOverlay" onclick="overlayClick(event,'teacherOverlay')">
  <div class="modal" style="width:420px;" onclick="event.stopPropagation()">
    <h3>新增老師</h3>
    <div class="form-row">
      <div class="field">
        <label>老師姓名 *</label>
        <input id="tName" type="text" placeholder="老師姓名">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>代表顏色</label>
        <input id="tColor" type="color" value="#b8894a" style="height:38px;">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('teacherOverlay')">取消</button>
      <button class="btn btn-gold" onclick="saveTeacher()">新增老師</button>
    </div>
  </div>
</div>

<!-- ── GROUP MODAL ── -->
<div class="overlay" id="groupOverlay" onclick="overlayClick(event,'groupOverlay')">
  <div class="modal" style="width:440px;" onclick="event.stopPropagation()">
    <h3>群組設定</h3>
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:20px;">建立新群組或輸入現有群組 ID 加入，同一群組的成員共享預約資料。</p>
    <div class="form-row">
      <div class="field">
        <label>現有群組 ID（加入）</label>
        <input id="joinGroupId" type="text" placeholder="貼上群組 ID">
      </div>
    </div>
    <div style="text-align:center;margin:10px 0;font-size:12px;color:var(--text-sub);">— 或 —</div>
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn btn-gold" onclick="createNewGroup()">建立新群組</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-cancel" onclick="closeModal('groupOverlay')">取消</button>
        <button class="btn btn-gold" onclick="joinGroup()">加入群組</button>
      </div>
    </div>
  </div>
</div>

<!-- ── SETTINGS MODAL ── -->
<div class="overlay" id="settingsOverlay" onclick="overlayClick(event,'settingsOverlay')">
  <div class="modal" style="width:480px;" onclick="event.stopPropagation()">
    <h3>系統設定</h3>
    <div class="config-section">
      <h4>標題顯示</h4>
      <div class="config-field"><label>系統名稱</label><input id="s_title" type="text"></div>
      <div class="config-field"><label>副標題</label><input id="s_sub" type="text"></div>
      <div class="config-field"><label>Logo 文字（單字）</label><input id="s_mark" type="text" maxlength="2"></div>
    </div>
    <div class="config-section">
      <h4>Firebase 設定（重新輸入後需重新整理）</h4>
      <div class="config-field"><label>API Key</label><input id="s_apiKey" type="text"></div>
      <div class="config-field"><label>Auth Domain</label><input id="s_authDomain" type="text"></div>
      <div class="config-field"><label>Project ID</label><input id="s_projectId" type="text"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('settingsOverlay')">關閉</button>
      <button class="btn btn-gold" onclick="saveSettings()">儲存設定</button>
    </div>
  </div>
</div>

<!-- ── TOAST CONTAINER ── -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
var db = null, auth = null, currentUser = null, currentGroupId = null;
var unsubscribeTeachers = null, unsubscribeBookings = null;
var teachers = [], bookings = [];
var currentNav = 'table';
var calYear, calMonth;
var renderDebounceTimer = null;
var isLoading = true;

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
window.onload = function() {
  applyStoredBranding();

  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  // 讀取 Firebase config（從 localStorage，不從硬編碼）
  var cfg = null;
  try {
    cfg = JSON.parse(localStorage.getItem('sb_firebase_config') || 'null');
  } catch(e) {
    cfg = null;
  }

  if (!cfg || !cfg.apiKey || !cfg.projectId) {
    document.getElementById('setupScreen').classList.add('open');
    return;
  }

  initFirebase(cfg);
};

function initFirebase(cfg) {
  try {
    // 避免重複初始化
    if (!firebase.apps.length) {
      firebase.initializeApp(cfg);
    }
    db = firebase.firestore();
    auth = firebase.auth();

    auth.onAuthStateChanged(function(user) {
      currentUser = user;
      if (user) {
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userName').textContent = user.displayName || user.email;
        document.getElementById('userAvatar').src = user.photoURL || '';
        document.getElementById('authBtn').textContent = '🚪 登出';
        checkUserGroup();
      } else {
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('authBtn').textContent = '👤 登入';
        stopDataListeners();
        teachers = [];
        bookings = [];
        currentGroupId = null;
        renderAll();
      }
    });
  } catch(e) {
    toast('Firebase 初始化失敗：' + e.message, '❌', true);
    document.getElementById('setupScreen').classList.add('open');
  }
}

// ════════════════════════════════════════════════
// FIREBASE CONFIG SETUP
// ════════════════════════════════════════════════
function saveFirebaseConfig() {
  var cfg = {
    apiKey:            document.getElementById('cfg_apiKey').value.trim(),
    authDomain:        document.getElementById('cfg_authDomain').value.trim(),
    projectId:         document.getElementById('cfg_projectId').value.trim(),
    storageBucket:     document.getElementById('cfg_storageBucket').value.trim(),
    messagingSenderId: document.getElementById('cfg_messagingSenderId').value.trim(),
    appId:             document.getElementById('cfg_appId').value.trim()
  };
  if (!cfg.apiKey || !cfg.projectId) {
    toast('請至少填寫 API Key 與 Project ID', '⚠️', true);
    return;
  }
  localStorage.setItem('sb_firebase_config', JSON.stringify(cfg));
  document.getElementById('setupScreen').classList.remove('open');
  initFirebase(cfg);
  toast('Firebase 設定已儲存，正在連線...', '✅');
}

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
function handleAuth() {
  if (!auth) { toast('請先設定 Firebase', '⚠️', true); return; }
  if (currentUser) {
    auth.signOut().then(function(){ toast('已登出', '👋'); });
  } else {
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function(e){
      toast('登入失敗：' + e.message, '❌', true);
    });
  }
}

// ════════════════════════════════════════════════
// GROUP MANAGEMENT
// ════════════════════════════════════════════════
async function checkUserGroup() {
  if (!db || !currentUser) return;
  try {
    var snap = await db.collection('groups')
      .where('memberUIDs', 'array-contains', currentUser.uid)
      .limit(1).get();
    if (!snap.empty) {
      currentGroupId = snap.docs[0].id;
      document.getElementById('groupInfo').textContent = '群組：' + currentGroupId.slice(0,8) + '...';
      startDataListeners();
    } else {
      isLoading = false;
      renderEmptyState('請先建立或加入群組，再開始新增預約');
      document.getElementById('groupInfo').textContent = '未加入任何群組';
    }
  } catch(e) {
    isLoading = false;
    toast('無法讀取群組資料：' + e.message, '❌', true);
  }
}

async function createNewGroup() {
  if (!currentUser) { toast('請先登入', '⚠️', true); return; }
  var newId = 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  try {
    await db.collection('groups').doc(newId).set({
      createdBy: currentUser.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      memberUIDs: [currentUser.uid]
    });
    currentGroupId = newId;
    closeModal('groupOverlay');
    document.getElementById('groupInfo').textContent = '群組：' + newId.slice(0,8) + '...';
    startDataListeners();
    toast('新群組已建立！ID：' + newId, '✅');
  } catch(e) {
    toast('建立群組失敗：' + e.message, '❌', true);
  }
}

async function joinGroup() {
  var gid = document.getElementById('joinGroupId').value.trim();
  if (!gid) { toast('請輸入群組 ID', '⚠️', true); return; }
  if (!currentUser) { toast('請先登入', '⚠️', true); return; }
  try {
    var ref = db.collection('groups').doc(gid);
    var snap = await ref.get();
    if (!snap.exists) { toast('找不到此群組', '❌', true); return; }
    await ref.update({ memberUIDs: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
    currentGroupId = gid;
    closeModal('groupOverlay');
    document.getElementById('joinGroupId').value = '';
    document.getElementById('groupInfo').textContent = '群組：' + gid.slice(0,8) + '...';
    startDataListeners();
    toast('已成功加入群組', '✅');
  } catch(e) {
    toast('加入群組失敗：' + e.message, '❌', true);
  }
}

// ════════════════════════════════════════════════
// DATA LISTENERS
// ════════════════════════════════════════════════
function startDataListeners() {
  stopDataListeners();
  if (!currentGroupId || !db) return;
  var path = 'groups/' + currentGroupId;

  unsubscribeTeachers = db.collection(path + '/teachers')
    .orderBy('name')
    .onSnapshot(function(snap) {
      teachers = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()); });
      renderTeacherFilters();
      renderTeacherList();
    }, function(e){ toast('讀取老師資料失敗', '❌', true); });

  unsubscribeBookings = db.collection(path + '/bookings')
    .orderBy('date', 'desc')
    .onSnapshot(function(snap) {
      bookings = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()); });
      isLoading = false;
      renderAll();
    }, function(e){ toast('讀取預約資料失敗', '❌', true); });
}

function stopDataListeners() {
  if (unsubscribeTeachers) { unsubscribeTeachers(); unsubscribeTeachers = null; }
  if (unsubscribeBookings) { unsubscribeBookings(); unsubscribeBookings = null; }
}

// ════════════════════════════════════════════════
// TIME UTILITIES
// ════════════════════════════════════════════════

/**
 * 將時間字串 "HH:MM" 轉為當天的分鐘數
 */
function timeToMins(t) {
  var parts = t.split(':').map(Number);
  return parts[0] * 60 + parts[1];
}

/**
 * 計算兩個時間段的實際分鐘差，處理跨午夜（max 23:59）
 */
function calcDuration(startTime, endTime) {
  var s = timeToMins(startTime);
  var e = timeToMins(endTime);
  if (e <= s) e += 1440; // 跨午夜
  return e - s;
}

/**
 * 將日期字串 "YYYY-MM-DD" 加上指定天數，傳回新日期字串
 */
function addDays(dateStr, days) {
  var d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

/**
 * 跨日衝突檢查：
 *   - 課程 A：date=fDate, start=fStart, end=fEnd（可能跨午夜到 fDate+1）
 *   - 課程 B：date=b.date, start=b.time, end=b.endTime
 * 以「絕對分鐘」（相對於 fDate 00:00）進行比對
 */
function checkConflict(fDate, fStart, fEnd, b) {
  // 計算 A 的絕對分鐘 (base = fDate 00:00)
  var aS = timeToMins(fStart);
  var aE = timeToMins(fEnd);
  if (aE <= aS) aE += 1440;

  // 計算 B 的基底偏移（天數差 × 1440）
  var bBase = 0;
  if (b.date === fDate) {
    bBase = 0;
  } else if (b.date === addDays(fDate, 1)) {
    // B 在隔天：只有 A 跨午夜才可能衝突
    bBase = 1440;
  } else if (b.date === addDays(fDate, -1)) {
    // B 在前一天：只有 B 跨午夜才可能衝突
    bBase = -1440;
  } else {
    return false; // 日期差距超過一天，不可能衝突
  }

  var bS = bBase + timeToMins(b.time);
  var bE_raw = timeToMins(b.endTime);
  var bE = bBase + bE_raw;
  if (bE_raw <= timeToMins(b.time)) bE += 1440; // B 自身跨午夜

  return aS < bE && aE > bS;
}

// ════════════════════════════════════════════════
// BOOKING CRUD
// ════════════════════════════════════════════════
function openNewBooking() {
  if (!currentGroupId) { toast('請先登入並加入群組', '⚠️', true); return; }
  clearBookingForm();
  document.getElementById('modalTitle').textContent = '新增預約';
  document.getElementById('editId').value = '';
  // 預設今天日期
  document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
  openModal('bookingOverlay');
}

function openEditBooking(id) {
  var b = bookings.find(function(x){ return x.id === id; });
  if (!b) return;
  clearBookingForm();
  document.getElementById('modalTitle').textContent = '編輯預約';
  document.getElementById('editId').value = b.id;
  document.getElementById('fName').value = b.name || '';
  document.getElementById('fTeacher').value = b.teacherId || '';
  document.getElementById('fCourse').value = b.course || '';
  document.getElementById('fDate').value = b.date || '';
  document.getElementById('fTime').value = b.time || '';
  document.getElementById('fEndTime').value = b.endTime || '';
  document.getElementById('fStatus').value = b.status || 'confirmed';
  document.getElementById('fNote').value = b.note || '';
  autoCalcDuration();
  openModal('bookingOverlay');
}

async function saveBooking() {
  var editId  = document.getElementById('editId').value;
  var name    = document.getElementById('fName').value.trim();
  var tid     = document.getElementById('fTeacher').value;
  var course  = document.getElementById('fCourse').value.trim();
  var date    = document.getElementById('fDate').value;
  var time    = document.getElementById('fTime').value;
  var endTime = document.getElementById('fEndTime').value;
  var status  = document.getElementById('fStatus').value;
  var note    = document.getElementById('fNote').value.trim();

  // 清除舊 error 樣式
  ['fName','fTeacher','fCourse','fDate','fTime','fEndTime'].forEach(function(id){
    document.getElementById(id).classList.remove('error');
  });
  document.getElementById('conflictWarn').style.display = 'none';

  // 必填驗證
  var errors = [];
  if (!name)    { errors.push('fName');    }
  if (!tid)     { errors.push('fTeacher'); }
  if (!course)  { errors.push('fCourse');  }
  if (!date)    { errors.push('fDate');    }
  if (!time)    { errors.push('fTime');    }
  if (!endTime) { errors.push('fEndTime'); }
  if (errors.length) {
    errors.forEach(function(id){ document.getElementById(id).classList.add('error'); });
    toast('請填寫所有必填項目', '⚠️', true);
    return;
  }

  // 時長驗證
  var duration = calcDuration(time, endTime);
  if (duration <= 0 || duration > 720) {
    toast('課程時長應介於 1 分鐘～12 小時之間', '⚠️', true);
    return;
  }

  // ── 前端衝突預檢（非權威，僅作 UX 提示）──
  // 真正的衝突防護應在 Firestore Transaction 或 Cloud Functions 完成
  var conflict = bookings.find(function(b) {
    if (b.teacherId !== tid) return false;
    if (b.id === editId) return false;
    if (b.status === 'cancelled') return false;
    return checkConflict(date, time, endTime, b);
  });

  if (conflict) {
    var warn = document.getElementById('conflictWarn');
    var t = teachers.find(function(x){ return x.id === conflict.teacherId; });
    warn.textContent = '⚠️ 時段衝突！' + (t ? t.name : '該老師') + ' 在 ' + conflict.date + ' ' + conflict.time + '~' + conflict.endTime + ' 已有「' + conflict.name + '」的課程。';
    warn.style.display = 'block';
    return;
  }

  var saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '儲存中...';

  try {
    var docId = editId || ('b' + Date.now() + '_' + Math.random().toString(36).slice(2,6));
    var obj = {
      name:      name,
      teacherId: tid,
      course:    course,
      date:      date,
      time:      time,
      endTime:   endTime,
      duration:  duration,
      status:    status,
      note:      note,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (!editId) {
      obj.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      obj.createdBy = currentUser ? currentUser.uid : null;
    }

    await db.collection('groups/' + currentGroupId + '/bookings').doc(docId).set(obj, { merge: true });
    closeModal('bookingOverlay');
    toast(editId ? '預約已更新' : '預約已新增', '✅');
  } catch(e) {
    toast('儲存失敗：' + e.message, '❌', true);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '儲存預約';
  }
}

async function cancelBooking(id) {
  if (!confirm('確定要取消這筆預約？')) return;
  try {
    await db.collection('groups/' + currentGroupId + '/bookings').doc(id).update({ status: 'cancelled' });
    toast('預約已取消', '✅');
  } catch(e) {
    toast('操作失敗：' + e.message, '❌', true);
  }
}

async function deleteBooking(id) {
  if (!confirm('確定要永久刪除這筆預約？此操作無法還原。')) return;
  try {
    await db.collection('groups/' + currentGroupId + '/bookings').doc(id).delete();
    toast('預約已刪除', '✅');
  } catch(e) {
    toast('刪除失敗：' + e.message, '❌', true);
  }
}

function openAddTeacher() {
  if (!currentGroupId) { toast('請先登入並加入群組', '⚠️', true); return; }
  document.getElementById('tName').value = '';
  document.getElementById('tColor').value = '#b8894a';
  openModal('teacherOverlay');
}

async function saveTeacher() {
  var name  = document.getElementById('tName').value.trim();
  var color = document.getElementById('tColor').value;
  if (!name) { toast('請輸入老師姓名', '⚠️', true); return; }
  if (teachers.some(function(t){ return t.name === name; })) {
    toast('此老師姓名已存在', '⚠️', true); return;
  }
  try {
    var docId = 't' + Date.now();
    await db.collection('groups/' + currentGroupId + '/teachers').doc(docId).set({
      name: name, color: color,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal('teacherOverlay');
    toast('老師已新增', '✅');
  } catch(e) {
    toast('新增失敗：' + e.message, '❌', true);
  }
}

async function deleteTeacher(id) {
  var t = teachers.find(function(x){ return x.id === id; });
  if (!t) return;
  var hasBookings = bookings.some(function(b){ return b.teacherId === id && b.status !== 'cancelled'; });
  if (hasBookings && !confirm(t.name + ' 仍有有效預約，確定要刪除此老師嗎？')) return;
  if (!hasBookings && !confirm('確定刪除老師「' + t.name + '」？')) return;
  try {
    await db.collection('groups/' + currentGroupId + '/teachers').doc(id).delete();
    toast('老師已刪除', '✅');
  } catch(e) {
    toast('刪除失敗：' + e.message, '❌', true);
  }
}

// ════════════════════════════════════════════════
// RENDER — TABLE VIEW
// ════════════════════════════════════════════════
function renderTable() {
  var content = document.getElementById('mainContent');
  if (isLoading) { content.innerHTML = '<div class="loading-state"><div class="spinner"></div>載入中...</div>'; return; }

  var filtered = getFilteredBookings();

  if (!currentGroupId) {
    renderEmptyState('請先登入並加入群組');
    return;
  }

  if (filtered.length === 0) {
    content.innerHTML = '<div class="table-wrap"><div class="no-data">暫無符合條件的預約記錄</div></div>';
    return;
  }

  var html = '<div class="table-wrap"><table><thead><tr>'
    + '<th>客戶</th><th>老師</th><th>課程</th><th>日期</th><th>時間</th><th>時長</th><th>狀態</th><th>備註</th><th>操作</th>'
    + '</tr></thead><tbody>';

  filtered.forEach(function(b) {
    var t = teachers.find(function(x){ return x.id === b.teacherId; });
    var tagClass = b.status === 'confirmed' ? 'tag-confirmed' : b.status === 'cancelled' ? 'tag-cancelled' : 'tag-pending';
    var tagLabel = b.status === 'confirmed' ? '已確認' : b.status === 'cancelled' ? '已取消' : '待確認';
    var dur = b.duration ? (Math.floor(b.duration/60) ? Math.floor(b.duration/60)+'h ' : '') + (b.duration%60 ? b.duration%60+'m' : '') : '—';
    var teacherDot = t ? '<span class="teacher-dot" style="background:' + (t.color||'#b8894a') + ';display:inline-block;margin-right:5px;"></span>' : '';

    html += '<tr>'
      + '<td><b>' + esc(b.name) + '</b></td>'
      + '<td>' + teacherDot + esc(t ? t.name : '—') + '</td>'
      + '<td>' + esc(b.course) + '</td>'
      + '<td>' + esc(b.date) + '</td>'
      + '<td style="white-space:nowrap">' + esc(b.time) + ' ~ ' + esc(b.endTime) + '</td>'
      + '<td style="white-space:nowrap;color:var(--text-sub)">' + esc(dur) + '</td>'
      + '<td><span class="tag ' + tagClass + '">' + tagLabel + '</span></td>'
      + '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-sub)">' + esc(b.note || '') + '</td>'
      + '<td><div class="td-actions">'
      + '<button class="btn btn-sm btn-outline" style="border-color:var(--border);color:var(--ink)" onclick="openEditBooking(\'' + b.id + '\')">編輯</button>'
      + (b.status !== 'cancelled' ? '<button class="btn btn-sm" style="background:#f0f0f0;color:#666" onclick="cancelBooking(\'' + b.id + '\')">取消</button>' : '')
      + '<button class="btn btn-sm btn-danger" onclick="deleteBooking(\'' + b.id + '\')">刪除</button>'
      + '</div></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

// ════════════════════════════════════════════════
// RENDER — STATS VIEW
// ════════════════════════════════════════════════
function renderStats() {
  var content = document.getElementById('mainContent');
  var active   = bookings.filter(function(b){ return b.status !== 'cancelled'; });
  var confirmed = bookings.filter(function(b){ return b.status === 'confirmed'; });
  var cancelled = bookings.filter(function(b){ return b.status === 'cancelled'; });

  var totalMins = active.reduce(function(sum, b){ return sum + (b.duration || 0); }, 0);
  var totalHours = (totalMins / 60).toFixed(1);

  // 統計每位老師的課程數
  var teacherStats = teachers.map(function(t) {
    var cnt = active.filter(function(b){ return b.teacherId === t.id; }).length;
    return { name: t.name, color: t.color || '#b8894a', count: cnt };
  }).sort(function(a,b){ return b.count - a.count; });

  // 最近 7 天的預約（以日期統計）
  var today = new Date(); today.setHours(0,0,0,0);
  var week = [];
  for (var i=6; i>=0; i--) {
    var d = new Date(today); d.setDate(d.getDate()-i);
    var ds = d.toISOString().slice(0,10);
    week.push({ date: ds, label: (d.getMonth()+1)+'/'+(d.getDate()), count: active.filter(function(b){ return b.date===ds; }).length });
  }
  var weekMax = Math.max.apply(null, week.map(function(w){ return w.count; })) || 1;

  var html = '<div class="stats-row">'
    + statCard(bookings.length, '總預約數')
    + statCard(confirmed.length, '已確認')
    + statCard(cancelled.length, '已取消')
    + statCard(totalHours + 'h', '有效課程時數')
    + '</div>';

  // 老師課堂分佈
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">';

  html += '<div class="table-wrap" style="padding:20px;">'
    + '<div style="font-size:13px;font-weight:600;margin-bottom:14px;">老師課堂分佈</div>';
  if (teacherStats.length === 0) {
    html += '<div style="color:var(--text-sub);font-size:13px;">尚無老師資料</div>';
  } else {
    teacherStats.forEach(function(t) {
      var pct = active.length > 0 ? Math.round(t.count / active.length * 100) : 0;
      html += '<div style="margin-bottom:10px;">'
        + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">'
        + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+t.color+';margin-right:6px;vertical-align:middle;"></span>' + esc(t.name) + '</span>'
        + '<span style="color:var(--text-sub)">' + t.count + ' 堂</span></div>'
        + '<div style="background:var(--cream);border-radius:4px;height:6px;">'
        + '<div style="background:'+t.color+';height:6px;border-radius:4px;width:'+pct+'%;transition:width 0.4s;"></div>'
        + '</div></div>';
    });
  }
  html += '</div>';

  // 近 7 天走勢
  html += '<div class="table-wrap" style="padding:20px;">'
    + '<div style="font-size:13px;font-weight:600;margin-bottom:14px;">近 7 天預約走勢</div>'
    + '<div style="display:flex;align-items:flex-end;gap:8px;height:80px;">';
  week.forEach(function(w) {
    var h = weekMax > 0 ? Math.round(w.count / weekMax * 70) : 0;
    var isToday = w.date === new Date().toISOString().slice(0,10);
    html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">'
      + '<div style="font-size:10px;color:var(--text-sub)">' + (w.count || '') + '</div>'
      + '<div style="width:100%;background:'+(isToday?'var(--gold)':'var(--gold-pale)')+';border-radius:3px 3px 0 0;height:' + Math.max(h,2) + 'px;min-height:2px;transition:height 0.4s;"></div>'
      + '<div style="font-size:10px;color:var(--text-sub)">' + w.label + '</div>'
      + '</div>';
  });
  html += '</div></div></div>';

  // 近期預約列表
  var upcoming = bookings
    .filter(function(b){ return b.status !== 'cancelled' && b.date >= new Date().toISOString().slice(0,10); })
    .sort(function(a,b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : a.time < b.time ? -1 : 1; })
    .slice(0, 8);

  if (upcoming.length > 0) {
    html += '<div class="table-wrap"><table><thead><tr><th>客戶</th><th>老師</th><th>課程</th><th>日期</th><th>時間</th></tr></thead><tbody>';
    upcoming.forEach(function(b) {
      var t = teachers.find(function(x){ return x.id === b.teacherId; });
      html += '<tr>'
        + '<td><b>' + esc(b.name) + '</b></td>'
        + '<td>' + esc(t ? t.name : '—') + '</td>'
        + '<td>' + esc(b.course) + '</td>'
        + '<td>' + esc(b.date) + '</td>'
        + '<td>' + esc(b.time) + ' ~ ' + esc(b.endTime) + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
  }

  content.innerHTML = html;
}

function statCard(num, label) {
  return '<div class="stat-card"><div class="stat-num">' + num + '</div><div class="stat-label">' + label + '</div></div>';
}

// ════════════════════════════════════════════════
// RENDER — CALENDAR VIEW
// ════════════════════════════════════════════════
function renderCalendar() {
  var content = document.getElementById('mainContent');
  var monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0,10);

  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay  = new Date(calYear, calMonth+1, 0);
  var startDow = firstDay.getDay(); // 0=Sun
  var active   = bookings.filter(function(b){ return b.status !== 'cancelled'; });

  var html = '<div class="cal-wrap"><div class="cal-header">'
    + '<button class="cal-nav" onclick="calPrev()">‹</button>'
    + '<div style="font-size:15px;font-weight:600;">' + calYear + ' 年 ' + monthNames[calMonth] + '</div>'
    + '<button class="cal-nav" onclick="calNext()">›</button>'
    + '</div><div class="cal-grid">';

  ['日','一','二','三','四','五','六'].forEach(function(d){
    html += '<div class="cal-day-header">' + d + '</div>';
  });

  // 補前面空白
  for (var i=0; i<startDow; i++) {
    var d = new Date(calYear, calMonth, 1 - (startDow - i));
    var ds = d.toISOString().slice(0,10);
    html += '<div class="cal-cell other-month"><div class="cal-date">' + d.getDate() + '</div></div>';
  }

  for (var day=1; day<=lastDay.getDate(); day++) {
    var ds = calYear + '-' + pad2(calMonth+1) + '-' + pad2(day);
    var dayBookings = active.filter(function(b){ return b.date===ds; })
      .sort(function(a,b){ return a.time < b.time ? -1 : 1; });
    var isToday = ds === todayStr;

    html += '<div class="cal-cell"><div class="cal-date' + (isToday?' today':'') + '">' + day + '</div>';
    dayBookings.slice(0,3).forEach(function(b) {
      var t = teachers.find(function(x){ return x.id===b.teacherId; });
      var col = t ? t.color : '#b8894a';
      html += '<div class="cal-event" style="background:' + col + '22;border-left:2px solid '+col+'" onclick="openEditBooking(\'' + b.id + '\')">'
        + esc(b.time) + ' ' + esc(b.name)
        + '</div>';
    });
    if (dayBookings.length > 3) {
      html += '<div style="font-size:9px;color:var(--text-sub);padding:2px 4px;">+' + (dayBookings.length-3) + ' 更多</div>';
    }
    html += '</div>';
  }

  // 補後面空白
  var remaining = 42 - startDow - lastDay.getDate();
  for (var i=1; i<=remaining; i++) {
    html += '<div class="cal-cell other-month"><div class="cal-date">' + i + '</div></div>';
  }

  html += '</div></div>';
  content.innerHTML = html;
}

function calPrev() { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

// ════════════════════════════════════════════════
// TEACHER SIDEBAR
// ════════════════════════════════════════════════
function renderTeacherList() {
  var el = document.getElementById('teacherList');
  if (teachers.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.35);padding:4px 10px;">尚無老師</div>';
    return;
  }
  el.innerHTML = teachers.map(function(t) {
    return '<div class="teacher-item">'
      + '<div style="display:flex;align-items:center;gap:6px;">'
      + '<span class="teacher-dot" style="background:' + (t.color||'#b8894a') + '"></span>'
      + esc(t.name)
      + '</div>'
      + '<button class="teacher-del" onclick="deleteTeacher(\'' + t.id + '\')" title="刪除">×</button>'
      + '</div>';
  }).join('');
}

function renderTeacherFilters() {
  var sel1 = document.getElementById('filterTeacher');
  var sel2 = document.getElementById('fTeacher');
  var v1 = sel1.value;
  var v2 = sel2.value;
  sel1.innerHTML = '<option value="">所有老師</option>' + teachers.map(function(t){
    return '<option value="' + t.id + '">' + esc(t.name) + '</option>';
  }).join('');
  sel2.innerHTML = '<option value="">選擇老師</option>' + teachers.map(function(t){
    return '<option value="' + t.id + '">' + esc(t.name) + '</option>';
  }).join('');
  if (v1) sel1.value = v1;
  if (v2) sel2.value = v2;
}

// ════════════════════════════════════════════════
// NAV & MAIN RENDER
// ════════════════════════════════════════════════
function switchNav(v) {
  currentNav = v;
  ['table','calendar','stats'].forEach(function(n){
    document.getElementById('nav-'+n).classList.toggle('active', n===v);
  });
  renderAll();
}

function renderAll() {
  if (currentNav === 'table')    renderTable();
  else if (currentNav === 'stats')    renderStats();
  else if (currentNav === 'calendar') renderCalendar();
}

function renderEmptyState(msg) {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-state" style="flex-direction:column;gap:8px;">'
    + '<div style="font-size:24px;">📭</div>'
    + '<div>' + esc(msg) + '</div>'
    + '</div>';
}

function getFilteredBookings() {
  var q  = document.getElementById('searchInput').value.toLowerCase();
  var ft = document.getElementById('filterTeacher').value;
  var fs = document.getElementById('filterStatus').value;
  return bookings.filter(function(b) {
    if (q && !(b.name||'').toLowerCase().includes(q) && !(b.course||'').toLowerCase().includes(q)) return false;
    if (ft && b.teacherId !== ft) return false;
    if (fs && b.status !== fs) return false;
    return true;
  });
}

function debouncedRender() {
  clearTimeout(renderDebounceTimer);
  renderDebounceTimer = setTimeout(renderAll, 200);
}

// ════════════════════════════════════════════════
// FORM HELPERS
// ════════════════════════════════════════════════
function autoCalcDuration() {
  var s = document.getElementById('fTime').value;
  var e = document.getElementById('fEndTime').value;
  var hint = document.getElementById('fDurationHint');
  document.getElementById('conflictWarn').style.display = 'none';
  if (!s || !e) { hint.textContent = ''; return; }
  var diff = calcDuration(s, e);
  if (diff <= 0) { hint.textContent = ''; return; }
  hint.textContent = '✓ 課程時長：' + Math.floor(diff/60) + ' 小時 ' + (diff%60) + ' 分';
}

function clearBookingForm() {
  ['fName','fCourse','fDate','fTime','fEndTime','fNote'].forEach(function(id){
    document.getElementById(id).value = '';
    document.getElementById(id).classList.remove('error');
  });
  document.getElementById('fTeacher').value = '';
  document.getElementById('fStatus').value = 'confirmed';
  document.getElementById('fDurationHint').textContent = '';
  document.getElementById('conflictWarn').style.display = 'none';
  document.getElementById('editId').value = '';
}

// ════════════════════════════════════════════════
// SETTINGS
// ════════════════════════════════════════════════
function openSettings() {
  var cfg = {};
  try { cfg = JSON.parse(localStorage.getItem('sb_firebase_config') || '{}'); } catch(e){}
  var brand = {};
  try { brand = JSON.parse(localStorage.getItem('sb_branding') || '{}'); } catch(e){}
  document.getElementById('s_title').value  = brand.title || '課程預約管理';
  document.getElementById('s_sub').value    = brand.sub   || 'Schedule Manager';
  document.getElementById('s_mark').value   = brand.mark  || '秘';
  document.getElementById('s_apiKey').value     = cfg.apiKey    || '';
  document.getElementById('s_authDomain').value = cfg.authDomain|| '';
  document.getElementById('s_projectId').value  = cfg.projectId || '';
  openModal('settingsOverlay');
}

function saveSettings() {
  var brand = {
    title: document.getElementById('s_title').value.trim() || '課程預約管理',
    sub:   document.getElementById('s_sub').value.trim()   || 'Schedule Manager',
    mark:  document.getElementById('s_mark').value.trim()  || '秘'
  };
  localStorage.setItem('sb_branding', JSON.stringify(brand));
  applyStoredBranding();

  var apiKey     = document.getElementById('s_apiKey').value.trim();
  var authDomain = document.getElementById('s_authDomain').value.trim();
  var projectId  = document.getElementById('s_projectId').value.trim();
  if (apiKey && projectId) {
    var old = {};
    try { old = JSON.parse(localStorage.getItem('sb_firebase_config') || '{}'); } catch(e){}
    old.apiKey = apiKey; old.authDomain = authDomain; old.projectId = projectId;
    localStorage.setItem('sb_firebase_config', JSON.stringify(old));
  }

  closeModal('settingsOverlay');
  toast('設定已儲存', '✅');
}

function applyStoredBranding() {
  var brand = {};
  try { brand = JSON.parse(localStorage.getItem('sb_branding') || '{}'); } catch(e){}
  if (brand.title) document.getElementById('logoTitle').textContent = brand.title;
  if (brand.sub)   document.getElementById('logoSub').textContent   = brand.sub;
  if (brand.mark)  document.getElementById('logoMark').textContent  = brand.mark;
  if (brand.title) document.title = brand.title;
}

// ════════════════════════════════════════════════
// MODAL HELPERS
// ════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function overlayClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
function openJoinGroup() { openModal('groupOverlay'); }

// ════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════
function toast(msg, icon, isError) {
  icon = icon || '✓';
  var el = document.createElement('div');
  el.className = 'toast' + (isError ? ' toast-error' : '');
  el.textContent = icon + ' ' + msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 4000);
}

// ════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pad2(n) { return n < 10 ? '0'+n : ''+n; }
